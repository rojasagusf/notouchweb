<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hand Gestures Smoke Test</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        background: #060b16;
        color: #e2e8f0;
      }

      .layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        min-height: 100vh;
      }

      .panel {
        border-right: 1px solid #1f2937;
        padding: 16px;
        display: grid;
        gap: 12px;
        align-content: start;
        background: #0b1220;
      }

      .panel h1 {
        margin: 0;
        font-size: 18px;
      }

      .panel p {
        margin: 0;
      }

      .muted {
        color: #94a3b8;
        font-size: 12px;
      }

      .controls {
        display: grid;
        gap: 8px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 700;
      }

      #start-btn {
        background: #1d4ed8;
        color: #fff;
      }

      #stop-btn {
        background: #334155;
        color: #fff;
      }

      .metrics {
        display: grid;
        gap: 6px;
        font-size: 13px;
      }

      .metrics code {
        color: #93c5fd;
      }

      .event-log {
        border: 1px solid #1f2937;
        border-radius: 8px;
        background: #020617;
        padding: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        max-height: 180px;
        overflow: auto;
        white-space: pre-wrap;
      }

      .stage {
        display: grid;
        place-items: center;
        padding: 20px;
        background: radial-gradient(circle at 15% 15%, #111827, #01030a);
      }

      .canvas-wrap {
        position: relative;
        width: min(980px, 96vw);
        aspect-ratio: 16 / 9;
        border: 1px solid #1f2937;
        border-radius: 12px;
        overflow: hidden;
        background: #000;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #video {
        display: none;
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .panel {
          border-right: 0;
          border-bottom: 1px solid #1f2937;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>Hand Gestures Smoke Test</h1>
        <p class="muted">Deteccion de mano + gestos V1 (open_palm y swipe_right)</p>

        <div class="controls">
          <button id="start-btn" type="button">Start</button>
          <button id="stop-btn" type="button">Stop</button>
        </div>

        <section class="metrics">
          <div>Status: <code id="status">idle</code></div>
          <div>Backend: <code id="backend">-</code></div>
          <div>FPS: <code id="fps">0</code></div>
          <div>Hand: <code id="hand">not_detected</code></div>
          <div>Open Palm: <code id="open-palm">0.00</code></div>
          <div>Swipe Right: <code id="swipe-right">0.00</code></div>
          <div>Candidate: <code id="candidate">-</code></div>
          <div>Cooldown: <code id="cooldown">ready</code></div>
          <div>Command: <code id="command">-</code></div>
          <div>Error: <code id="error">-</code></div>
        </section>

        <div>
          <p class="muted" style="margin-bottom:8px;">Event log</p>
          <div id="event-log" class="event-log">-</div>
        </div>
      </aside>

      <main class="stage">
        <div class="canvas-wrap">
          <canvas id="video-canvas"></canvas>
          <canvas id="overlay-canvas"></canvas>
        </div>
      </main>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <script type="module" src="./hand-gestures.js"></script>
  </body>
</html>
