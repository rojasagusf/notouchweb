<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Body Segmentation Smoke Test</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color-scheme: dark;
      }

      body {
        margin: 0;
        background: #0b1020;
        color: #e2e8f0;
      }

      .layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        min-height: 100vh;
      }

      .panel {
        border-right: 1px solid #1e293b;
        padding: 16px;
        display: grid;
        gap: 12px;
        align-content: start;
        background: #0f172a;
      }

      .title {
        margin: 0;
        font-size: 18px;
      }

      .subtitle {
        margin: 0;
        font-size: 12px;
        color: #94a3b8;
      }

      .controls {
        display: grid;
        gap: 8px;
      }

      .controls button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 600;
      }

      #start-btn {
        background: #1d4ed8;
        color: #fff;
      }

      #stop-btn {
        background: #334155;
        color: #fff;
      }

      .metrics {
        display: grid;
        gap: 6px;
        font-size: 13px;
      }

      .metrics code {
        color: #93c5fd;
      }

      .help {
        margin-top: 8px;
        font-size: 12px;
        color: #94a3b8;
        line-height: 1.45;
      }

      .stage {
        display: grid;
        place-items: center;
        padding: 20px;
        background: radial-gradient(circle at 10% 10%, #111827, #020617);
      }

      .canvas-wrap {
        position: relative;
        width: min(980px, 96vw);
        aspect-ratio: 16 / 9;
        border: 1px solid #1f2937;
        border-radius: 12px;
        overflow: hidden;
        background: #000;
      }

      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #mask-canvas {
        opacity: 0.72;
        mix-blend-mode: screen;
      }

      #video {
        display: none;
      }

      .error {
        color: #fca5a5;
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .panel {
          border-right: 0;
          border-bottom: 1px solid #1e293b;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1 class="title">Body Segmentation Smoke Test</h1>
        <p class="subtitle">Camara + deteccion de cuerpo (sin extension)</p>

        <div class="controls">
          <button id="start-btn" type="button">Start</button>
          <button id="stop-btn" type="button">Stop</button>
        </div>

        <section class="metrics">
          <div>Status: <code id="status">idle</code></div>
          <div>Backend: <code id="backend">-</code></div>
          <div>FPS: <code id="fps">0</code></div>
          <div>Foreground Ratio: <code id="ratio">0.000</code></div>
          <div>Mask Size: <code id="mask-size">-</code></div>
          <div>Last Error: <code id="error">-</code></div>
        </section>

        <p class="help">
          Si esto funciona, ya tienen listo el bloque base de camara + deteccion corporal para enchufar al offscreen de la extension.
        </p>
      </aside>

      <main class="stage">
        <div class="canvas-wrap">
          <canvas id="video-canvas"></canvas>
          <canvas id="mask-canvas"></canvas>
        </div>
      </main>
    </div>

    <video id="video" autoplay muted playsinline></video>
    <script type="module" src="./body-segmentation.js"></script>
  </body>
</html>
