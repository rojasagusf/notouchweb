<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>NoTouchWeb — Permiso de cámara</title>
  <style>
    body {
      margin: 0;
      background: #0f0f11;
      color: #e8e8f0;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 48px; }
    h2 { font-size: 16px; margin: 0; color: #00d4aa; }
    p  { font-size: 13px; color: #6b6b80; margin: 0; line-height: 1.5; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #2a2a32;
      border-top-color: #00d4aa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #00d4aa; font-size: 40px; display: none; }
    .error-msg { color: #ef4444; font-size: 12px; display: none; }
  </style>
</head>
<body>
  <div class="icon">🖐</div>
  <h2>NoTouchWeb necesita la cámara</h2>
  <p>Aceptá el permiso cuando Chrome lo solicite.<br>Esta ventana se cierra sola.</p>
  <div class="spinner" id="spinner"></div>
  <div class="success" id="success">✓</div>
  <p class="error-msg" id="error-msg"></p>
  <script src="grant.js"></script>
</body>
</html>
