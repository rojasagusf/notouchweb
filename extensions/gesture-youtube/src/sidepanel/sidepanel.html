<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>NoTouchWeb</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">🖐</span>
      <span class="logo-text">NoTouchWeb</span>
    </div>
    <div class="badge" id="fps">— fps</div>
  </header>

  <section class="status-bar">
    <span class="dot idle" id="status-dot"></span>
    <span id="status-text">Inactivo</span>
  </section>

  <section class="controls">
    <button id="btn-toggle">Iniciar</button>
  </section>

  <section id="camera-section" class="hidden">
    <div class="canvas-wrapper">
      <video id="camera-feed" playsinline muted></video>
      <canvas id="camera-canvas"></canvas>
    </div>
  </section>

  <section class="gestures">
    <div class="gesture-card" id="card-palm">
      <div class="card-header">
        <span class="gesture-name">🖐 Palma abierta</span>
        <span class="gesture-val" id="val-palm">0%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-palm"></div></div>
    </div>
    <div class="gesture-card" id="card-fist">
      <div class="card-header">
        <span class="gesture-name">✊ Puño cerrado</span>
        <span class="gesture-val" id="val-fist">0%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-fist"></div></div>
    </div>
    <div class="gesture-card" id="card-swiper">
      <div class="card-header">
        <span class="gesture-name">👉 Swipe derecha</span>
        <span class="gesture-val" id="val-swiper">0%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-swiper"></div></div>
    </div>
    <div class="gesture-card" id="card-swipel">
      <div class="card-header">
        <span class="gesture-name">👈 Swipe izquierda</span>
        <span class="gesture-val" id="val-swipel">0%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar-swipel"></div></div>
    </div>
  </section>

  <section class="log-section">
    <div class="log-title">Gestos detectados</div>
    <div id="event-log"></div>
  </section>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
